        .relic-item {

        .relic-actions button {

<body>
    <header>
        <h1>时光留声</h1>
        <div class="user-info">
            <span id="user-email">用户邮箱</span>
            <button id="logout-btn">退出登录</button>
        </div>
    </header>

    <div class="main-container">
        <!-- 左侧联系人列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>联系人</h2>
                <button class="add-contact-btn" id="add-contact-btn">添加联系人</button>
            </div>
            <div class="contacts-list" id="contacts-list">
                <!-- 联系人列表将通过JS动态生成 -->
            </div>
        </div>

        <!-- 右侧内容区 -->
        <div class="content-area">
            <div class="content-header">
                <h2>录制与遗物管理</h2>
            </div>
            <div class="content-body">
                <!-- 录制区域 -->
                <div class="recording-section">
                    <h3>音视频录制</h3>
                    <div class="preview-container">
                        <div id="preview">
                            <!-- 视频预览将通过JS动态生成 -->
                            <p>点击开始录制按钮调用摄像头/麦克风</p>
                        </div>
                    </div>
                    <div class="recording-controls">
                        <button id="start-record">开始录制</button>
                        <button id="stop-record" disabled>停止录制</button>
                        <button id="toggle-camera">切换摄像头</button>
                    </div>
                    <div class="message" id="recording-message"></div>
                </div>

                <!-- 遗物创建区域 -->
                <div class="relic-section">
                    <h3>创建遗物</h3>
                    <form class="relic-form" id="relic-form">
                        <div class="form-group">
                            <label for="relic-contact">选择联系人</label>
                            <select id="relic-contact" required>
                                <!-- 联系人选项将通过JS动态生成 -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="relic-title">标题</label>
                            <input type="text" id="relic-title" required>
                        </div>
                        <div class="form-group">
                            <label for="relic-content">内容</label>
                            <textarea id="relic-content" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>沉默阈值</label>
                            <div style="display: flex; gap: 10px;">
                                <div style="width: 100px; position: relative;">
                                    <input type="number" id="silence-years" min="0" max="100" value="0" placeholder="0" style="padding-right: 30px; width: 100%;">
                                    <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.7);">年</span>
                                </div>
                                <div style="width: 100px; position: relative;">
                                    <input type="number" id="silence-months" min="0" max="11" value="0" placeholder="0" style="padding-right: 30px; width: 100%;">
                                    <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.7);">月</span>
                                </div>
                                <div style="width: 100px; position: relative;">
                                    <input type="number" id="silence-days" min="1" max="31" value="7" placeholder="7" style="padding-right: 30px; width: 100%;" required>
                                    <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.7);">天</span>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; margin-right: 20px;">
                                <input type="checkbox" id="anonymous-send" style="width: auto; margin: 0;">
                                <label for="anonymous-send" style="margin: 0;">匿名发送</label>
                            </div>
                            <button type="submit" id="save-relic">保存遗物</button>
                        </div>
                    </form>
                    <div class="relics-list" id="relics-list">
                        <h4>已创建的遗物</h4>
                        <!-- 遗物列表将通过JS动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加联系人模态框 -->
    <div class="modal" id="add-contact-modal">
        <div class="modal-content">
            <h3>添加联系人</h3>
            <form id="contact-form">
                <div class="form-group">
                    <label for="contact-name">姓名</label>
                    <input type="text" id="contact-name" required>
                </div>
                <div class="form-group">

                </div>
                <div class="form-group">

                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-contact">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
            <div class="message" id="contact-message"></div>
        </div>
    </div>

        // 播放视频
        function playVideo(videoUrl) {
            console.log('开始播放视频，URL:', videoUrl);
            
            // 先显示加载中的模态框
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.style.zIndex = '1001';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 800px; text-align: center;">
                    <button class="btn btn-secondary" style="position: absolute; top: 10px; right: 10px; z-index: 10;">关闭</button>
                    <div style="padding: 50px;">
                        <p style="color: white; font-size: 18px;">视频加载中，请稍候...</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // 检查视频URL是否可访问
            fetch(videoUrl, {
                method: 'HEAD'
            })
            .then(response => {
                console.log('视频URL响应状态:', response.status);
                console.log('视频URL响应头:', response.headers);
                if (!response.ok) {
                    console.error('视频URL无法访问，状态码:', response.status);
                    alert(`视频URL无法访问，状态码: ${response.status}`);
                    document.body.removeChild(modal);
                    return;
                }
                
                // URL可访问，创建视频元素
                const video = document.createElement('video');
                video.src = videoUrl;
                video.controls = true;
                video.autoplay = true;
                video.style.width = '100%';
                video.style.height = 'auto';
                video.preload = 'metadata'; // 预加载元数据
                
                // 添加错误处理
                video.addEventListener('error', (e) => {
                    console.error('视频播放错误:', e);
                    console.error('视频错误代码:', video.error.code);
                    console.error('视频错误信息:', video.error.message);
                    alert(`视频播放失败: ${video.error.message}`);
                    document.body.removeChild(modal);
                });
                
                // 添加加载事件
                video.addEventListener('loadedmetadata', () => {
                    console.log('视频元数据加载成功，时长:', video.duration);
                    console.log('视频宽度:', video.videoWidth);
                    console.log('视频高度:', video.videoHeight);
                    // 元数据加载完成后，更新模态框内容
                    modal.innerHTML = `
                        <div class="modal-content" style="max-width: 800px;">
                            <button class="btn btn-secondary" style="position: absolute; top: 10px; right: 10px; z-index: 10;">关闭</button>
                            ${video.outerHTML}
                        </div>
                    `;
                    // 重新绑定关闭按钮事件
                    modal.querySelector('.btn-secondary').addEventListener('click', () => {
                        document.body.removeChild(modal);
                    });
                });
                
                // 添加播放事件
                video.addEventListener('play', () => {
                    console.log('视频开始播放');
                });
                
                // 添加结束事件
                video.addEventListener('ended', () => {
                    console.log('视频播放结束');
                });
            })
            .catch(error => {
                console.error('检查视频URL时发生错误:', error);
                alert(`检查视频URL时发生错误: ${error.message}`);
                document.body.removeChild(modal);
            });
        }

        // 初始化音视频录制
        async function initRecording() {
            try {
                // 调用摄像头和麦克风
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: isCameraOn,
                    audio: true
                });

                // 创建视频预览
                const preview = document.getElementById('preview');
                preview.innerHTML = '';
                const video = document.createElement('video');
                video.srcObject = mediaStream;
                video.autoplay = true;
                video.muted = true; // 防止回声
                preview.appendChild(video);

                showMessage('recording-message', 'success', '摄像头/麦克风已成功调用');
            } catch (error) {
                console.error('调用摄像头/麦克风失败:', error);
                showMessage('recording-message', 'error', '调用摄像头/麦克风失败，请检查权限设置');
            }
        }

        // 开始录制
        function startRecording() {
            if (!mediaStream) {
                initRecording().then(() => {
                    startRecording();
                });
                return;
            }

            // 创建媒体录制器
            mediaRecorder = new MediaRecorder(mediaStream, {
                mimeType: isCameraOn ? 'video/webm' : 'audio/webm'
            });

            // 监听数据可用事件
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            // 监听录制结束事件
            mediaRecorder.onstop = async () => {
                // 立即停止媒体流，确保视频真正停止录制
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                }

                const blob = new Blob(recordedChunks, {
                    type: isCameraOn ? 'video/webm' : 'audio/webm'
                });

                // 上传到Supabase Storage
                await uploadToStorage(blob);

                // 重置录制状态
                recordedChunks = [];
                
                // 重置预览区域
                const preview = document.getElementById('preview');
                preview.innerHTML = '<p>点击开始录制按钮调用摄像头/麦克风</p>';
            };

            // 开始录制
            mediaRecorder.start();
            document.getElementById('start-record').disabled = true;
            document.getElementById('stop-record').disabled = false;
            showMessage('recording-message', 'success', '开始录制...');
        }

        // 停止录制
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                document.getElementById('start-record').disabled = false;
                document.getElementById('stop-record').disabled = true;
                showMessage('recording-message', 'success', '录制已停止，正在上传...');
            }
        }

        // 上传到Supabase Storage
        async function uploadToStorage(blob) {
            if (!currentUser || !window.supabase) return;

            try {
                // 使用简单的文件名，不使用复杂的目录结构
                const fileName = `${Date.now()}.webm`;
                const fileType = isCameraOn ? 'video' : 'audio';

                console.log('上传文件路径:', fileName);
                console.log('存储桶名称:', 'recordings');

                // 显示上传中消息
                showMessage('recording-message', 'success', '正在上传文件...');

                // 直接尝试上传文件，跳过存储桶检查和创建
                // 因为用户说已经有存储桶了，可能是权限问题导致无法列出存储桶
                console.log('直接尝试上传文件...');

                // 上传文件
                const { data, error } = await window.supabase
                    .storage
                    .from('recordings')
                    .upload(fileName, blob, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (error) {
                    console.error('上传失败:', error);
                    showMessage('recording-message', 'error', `上传失败: ${error.message}`);
                    return;
                }

                console.log('上传成功:', data);

                // 获取签名URL，有效期为7天
                const { data: signedUrlData } = await window.supabase
                    .storage
                    .from('recordings')
                    .createSignedUrl(fileName, 60 * 60 * 24 * 7); // 7天有效期
                
                const signedUrl = signedUrlData.signedUrl;
                console.log('获取到的签名视频URL:', signedUrl);

                // 保存文件元数据到数据库
                const { error: dbError } = await window.supabase
                    .from('recording_files')
                    .insert({
                        user_id: currentUser.id,
                        file_url: signedUrl,
                        file_type: fileType,
                        duration: 0 // 暂时设置为0，实际应用中可以计算
                    });

                if (dbError) {
                    console.error('保存文件元数据失败:', dbError);
                    showMessage('recording-message', 'error', '保存文件元数据失败');
                    return;
                }

                // 更新最近上传的文件URL
                lastUploadedFileUrl = signedUrl;
                showMessage('recording-message', 'success', '上传成功！文件已保存，可用于创建遗物');
                
                // 显示最近上传的文件预览
                updateRecentFilesPreview();
            } catch (error) {
                console.error('上传过程中发生错误:', error);
                showMessage('recording-message', 'error', `上传过程中发生错误: ${error.message}`);
            }
        }

        // 切换摄像头
        function toggleCamera() {
            isCameraOn = !isCameraOn;
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            initRecording();
        }

        // 格式化沉默阈值为年、月、天
        function formatSilenceThreshold(days) {
            if (!days || days <= 0) return '0天';
            
            const years = Math.floor(days / 365);
            const remainingDays = days % 365;
            const months = Math.floor(remainingDays / 30);
            const finalDays = remainingDays % 30;
            
            let result = '';
            if (years > 0) result += `${years}年`;
            if (months > 0) result += `${months}月`;
            if (finalDays > 0) result += `${finalDays}天`;
            
            return result;
        }

        // 初始化遗物表单
        function initRelicForm() {
            const relicForm = document.getElementById('relic-form');

            relicForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!currentUser) return;

                const contactId = document.getElementById('relic-contact').value;
                const title = document.getElementById('relic-title').value;
                const content = document.getElementById('relic-content').value;
                const silenceYears = parseInt(document.getElementById('silence-years').value) || 0;
                const silenceMonths = parseInt(document.getElementById('silence-months').value) || 0;
                const silenceDays = parseInt(document.getElementById('silence-days').value) || 0;
                const silenceThreshold = silenceYears * 365 + silenceMonths * 30 + silenceDays;
                // 暂时注释掉匿名发送功能，因为数据库表中缺少该字段
                // const anonymousSend = document.getElementById('anonymous-send').checked;

                if (!contactId) {
                    showMessage('recording-message', 'error', '请选择联系人');
                    return;
                }

                try {
                    console.log('开始创建遗物...');
                    console.log('当前用户:', currentUser);
                    console.log('联系人ID:', contactId);
                    console.log('标题:', title);
                    console.log('内容:', content);
                    console.log('沉默阈值:', silenceThreshold);
                    // console.log('匿名发送:', anonymousSend);
                    console.log('Supabase实例:', window.supabase);
                    
                    if (!window.supabase) {
                        console.error('Supabase未初始化');
                        showMessage('recording-message', 'error', 'Supabase未初始化，请刷新页面重试');
                        return;
                    }
                    
                    if (!currentUser) {
                        console.error('当前用户未登录');
                        showMessage('recording-message', 'error', '用户未登录，请重新登录');
                        return;
                    }
                    
                    // 准备要插入的数据
                    const relicData = {
                        user_id: currentUser.id,
                        contact_id: contactId,
                        title,
                        content,
                        // 暂时注释掉匿名发送字段，因为数据库表中缺少该字段
                        // anonymous_send: anonymousSend,
                        silence_threshold_days: silenceThreshold
                    };
                    
                    // 如果有最近上传的文件，添加到遗物数据中
                    if (lastUploadedFileUrl) {
                        if (lastUploadedFileUrl.includes('.webm')) {
                            // 假设是视频文件
                            relicData.video_url = lastUploadedFileUrl;
                        } else {
                            // 假设是音频文件
                            relicData.audio_url = lastUploadedFileUrl;
                        }
                    }
                    
                    const { data, error } = await window.supabase
                        .from('relics')
                        .insert(relicData);

                    if (error) {
                        console.error('创建遗物失败:', error);
                        showMessage('recording-message', 'error', `创建遗物失败: ${error.message}`);
                        return;
                    }

                    console.log('遗物创建成功:', data);
                    showMessage('recording-message', 'success', '遗物创建成功');
                    relicForm.reset();
                    loadRelics(contactId);
                } catch (e) {
                    console.error('创建遗物过程中发生错误:', e);
                    showMessage('recording-message', 'error', `创建遗物过程中发生错误: ${e.message}`);
                }
            });
        }

        // 初始化退出登录
        function initLogout() {
            document.getElementById('logout-btn').addEventListener('click', async () => {
                try {
                    if (window.supabase && window.supabase.auth) {
                        const { error } = await window.supabase.auth.signOut();
                        if (error) {
                            console.error('退出登录失败:', error);
                        } else {
                            window.location.href = 'index.html';
                        }
                    } else {
                        // Supabase未初始化，直接跳转到登录页面
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    console.error('退出登录过程中发生错误:', e);
                    // 发生错误，直接跳转到登录页面
                    window.location.href = 'index.html';
                }
            });
        }

        // 发送邮件函数
        async function sendEmail(to, subject, body) {
            try {
                const response = await fetch('/api/send_email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        to: to,
                        subject: subject,
                        body: body
                    })
                });
                
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('发送邮件失败:', error);
                return { success: false, message: '发送失败' };
            }
        }

        // 检查沉默阈值并发送遗物
        async function checkSilenceThresholds() {
            if (!currentUser || !window.supabase) return;

            try {
                // 获取所有遗物
                const { data: relics, error } = await window.supabase
                    .from('relics')
                    .select('*, contacts(email, phone)')
                    .eq('user_id', currentUser.id);

                if (error) {
                    console.error('获取遗物失败:', error);
                    return;
                }

                const now = new Date();

                relics.forEach(async (relic) => {
                    // 计算创建时间到现在的天数
                    const createdAt = new Date(relic.created_at);
                    const daysSinceCreation = Math.floor((now - createdAt) / (1000 * 60 * 60 * 24));

                    // 检查是否达到沉默阈值
                    if (daysSinceCreation >= relic.silence_threshold_days && !relic.sent) {
                        // 根据联系人信息决定发送方式
                        const contact = relic.contacts;
                        let sendMethod = null;

                        if (contact.email) {
                            sendMethod = 'email';
                            // 调用发送邮件的API
                            const emailResult = await sendEmail(
                                contact.email,
                                `【时光留声】${relic.anonymous_send ? '匿名' : ''}遗物`,
                                `您收到了${relic.anonymous_send ? '匿名' : ''}遗物：

标题：${relic.title}
内容：${relic.content}

${relic.video_url ? `视频链接：${relic.video_url}` : ''}

此邮件由时光留声系统自动发送，请勿直接回复。`
                            );
                            console.log(`发送邮件到: ${contact.email}，结果: ${emailResult.success ? '成功' : '失败'}`);
                        } else if (contact.phone) {
                            sendMethod = 'sms';
                            // 这里应该调用发送短信的API
                            console.log(`${relic.anonymous_send ? '匿名' : ''}发送短信到: ${contact.phone}，内容: ${relic.title}`);
                        }

                        if (sendMethod) {
                            // 更新遗物状态为已发送
                            await window.supabase
                                .from('relics')
                                .update({ sent: true, sent_at: new Date().toISOString() })
                                .eq('id', relic.id);

                            console.log(`遗物已发送: ${relic.title}，发送方式: ${sendMethod}`);
                        }
                    }
                });
            } catch (e) {
                console.error('检查沉默阈值过程中发生错误:', e);
            }
        }

        // 初始化应用
        function initApp() {
            console.log('开始初始化应用...');
            // 首先初始化Supabase
            initializeSupabase();
            
            // 初始化其他功能
            initAddContactModal();
            initRelicForm();
            initLogout();

            // 绑定录制按钮事件
            document.getElementById('start-record').addEventListener('click', startRecording);
            document.getElementById('stop-record').addEventListener('click', stopRecording);
            document.getElementById('toggle-camera').addEventListener('click', toggleCamera);

            // 检查沉默阈值
            setTimeout(checkSilenceThresholds, 6000); // 延迟6秒执行，确保用户已登录
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
