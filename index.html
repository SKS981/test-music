        // 处理视频背景在移动端的自动播放
        function handleVideoBackground() {
            const video = document.getElementById('background-video');
            
            // 检测是否为移动设备
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // 尝试播放视频
            function playVideo() {
                console.log('尝试播放视频...');
                video.play().then(() => {
                    console.log('视频播放成功');
                    video.style.display = 'block';
                    document.body.style.background = 'transparent';
                }).catch(error => {
                    console.log('视频自动播放失败:', error);
                    // 视频播放失败时，使用备用背景
                    video.style.display = 'none';
                    document.body.style.background = 'url(rad.png) no-repeat center center fixed';
                    document.body.style.backgroundSize = 'cover';
                });
            }
            
            // 对于移动设备，添加用户交互后再尝试播放
            if (isMobile) {
                console.log('检测到移动设备，等待用户交互后播放视频');
                // 监听用户交互事件
                const events = ['touchstart', 'click', 'touchend', 'mousedown', 'mouseup', 'keydown'];
                events.forEach(event => {
                    document.addEventListener(event, playVideo, { once: true });
                });
            } else {
                // 对于桌面设备，立即尝试播放
                playVideo();
                // 同时也添加交互事件作为备用
                const events = ['touchstart', 'click', 'touchend', 'mousedown', 'mouseup', 'keydown'];
                events.forEach(event => {
                    document.addEventListener(event, playVideo, { once: true });
                });
            }
            
            // 监听视频加载完成事件
            video.addEventListener('loadedmetadata', () => {
                console.log('视频元数据加载完成');
                playVideo();
            });
            
            // 监听视频加载错误事件

                console.log('视频加载错误:', e);
                video.style.display = 'none';

        // Canvas背景交互效果
        class BackgroundCanvas {
            constructor() {
                this.canvas = document.getElementById('background-canvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
                this.backgroundImage = new Image();
                this.originalImageData = null;
                this.mousePos = { x: 0, y: 0 };
                this.strength = 15;
                this.radius = 100;
                this.isImageReady = false;
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                document.addEventListener('mousemove', (e) => this.updateMousePos(e));
                
                // 加载背景图片
                this.loadBackgroundImage();
            }
            
            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                // 重新绘制背景
                if (this.isImageReady) {
                    this.drawBackgroundImage();
                }
            }
            
            updateMousePos(e) {
                this.mousePos.x = e.clientX;
                this.mousePos.y = e.clientY;
            }
            
            loadBackgroundImage() {
                // 不加载背景图片，只提供鼠标交互效果
                // 因为我们使用视频作为主要背景
                this.isImageReady = true;
                // 创建透明的初始图像数据
                this.originalImageData = this.ctx.createImageData(this.canvas.width, this.canvas.height);
                this.startAnimationLoop();
            }
            
            drawBackgroundImage() {
                if (!this.isImageReady) return;
                
                // 绘制背景图片，确保覆盖整个画布
                this.ctx.drawImage(this.backgroundImage, 0, 0, this.canvas.width, this.canvas.height);
                
                // 保存原始图像数据
                this.originalImageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
            }
            
            useDefaultBackground() {
                // 图片加载失败时使用默认背景
                this.canvas.width = this.canvas.width; // 清空画布
                const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                gradient.addColorStop(0, '#4A90E2');
                gradient.addColorStop(1, '#5B9EF3');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.originalImageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
            }
            
            startAnimationLoop() {
                const loop = () => {
                    if (this.originalImageData) {
                        this.animate();
                    }
                    requestAnimationFrame(loop);
                };
                loop();
            }
            
            animate() {
                if (!this.originalImageData) return;
                
                // 清空画布，保持透明
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 只在鼠标附近绘制一个半透明的效果
                const gradient = this.ctx.createRadialGradient(
                    this.mousePos.x, this.mousePos.y, 0,
                    this.mousePos.x, this.mousePos.y, this.radius
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                this.ctx.fillStyle = gradient;
                this.ctx.beginPath();
                this.ctx.arc(this.mousePos.x, this.mousePos.y, this.radius, 0, Math.PI * 2);
                this.ctx.fill();
            }
        }

            // 初始化Canvas背景

        }
